<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход · Пассажирам.РФ. Обучение перевозкам: автобус, электробус, трамвай
</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app app-auth">
        <div class="auth-container">
            <div class="auth-header">
                <h1 class="auth-title">Пассажирам.РФ</h1>
                <p class="auth-subtitle">Войдите в аккаунт</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginLogin"><i class="fas fa-user"></i> Логин</label>
                    <input type="text" id="loginLogin" class="form-control" placeholder="Введите логин" required>
                    <div class="error-text" id="loginError"></div>
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Введите пароль" required>
                    <div class="error-text" id="passwordError"></div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
            </form>

            <div class="auth-footer">
                <p>Ещё не зарегистрированы? <a href="register.html" class="nav-link">Регистрация</a></p>
            </div>
        </div>
    </div>
    <script src="assets/js/app.js"></script>
</body>
</html>
